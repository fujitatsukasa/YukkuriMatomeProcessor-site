    <script>
      (function (location) {
        if (location.search[1] !== '/') {
          return;
        }
        const decoded = location.search
          .slice(1)
          .split('&')
          .map(function (part) {
            return part.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(null, '', decoded + location.hash);
      })(window.location);
    </script>
