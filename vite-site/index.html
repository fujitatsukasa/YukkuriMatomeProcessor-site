<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a090c" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (function (location) {
        if (location.search[1] !== '/') {
          return;
        }
        const decoded = location.search
          .slice(1)
          .split('&')
          .map(function (part) {
            return part.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(null, '', decoded + location.hash);
      })(window.location);
    </script>
    <title>ゆっくりまとめプロセッサー | YMM4向け動画制作支援ツール</title>

    <meta name="twitter:creator" content="@OTM_corp" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
